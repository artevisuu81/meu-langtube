<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangTube Learner Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f5f7fb;
            --container-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --border-color: #e0e0e0;
            --highlight-color: #fff3cd;
            --info-bg: #e1f5fe;
            --info-text: #0288d1;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary-color: #bb86fc;
            --primary-hover: #9c4dcc;
            --border-color: #333333;
            --highlight-color: #443d2c;
            --info-bg: #1c2835;
            --info-text: #b3e5fc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--container-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .btn-action {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-action:hover { background: var(--primary-hover); }

        .theme-toggle {
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-color);
        }

        /* ÁREA DE CONFIGURAÇÃO */
        .config-box {
            background: var(--container-bg);
            border: 2px dashed var(--primary-color);
            padding: 20px;
            border-radius: 8px;
            margin: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .config-box.hidden { display: none; }

        .config-inputs {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
        }

        .input-field {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
        }

        textarea.input-field {
            height: 120px;
            resize: vertical;
        }

        /* Layout de Conteúdo */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            padding: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .video-wrapper {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .transcript-container {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
        }

        /* Banner informativo de funcionalidade */
        .info-tip-bar {
            background-color: var(--info-bg);
            color: var(--info-text);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.88rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid var(--primary-color);
        }

        .transcript-box {
            height: 280px;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .transcript-line {
            opacity: 0.5;
            transition: all 0.2s;
            margin-bottom: 12px;
            padding: 6px 10px;
            cursor: pointer;
            border-left: 3px solid transparent;
            border-radius: 0 4px 4px 0;
        }

        .transcript-line:hover { opacity: 0.8; background: rgba(0,0,0,0.02); }

        .transcript-line.active {
            opacity: 1;
            font-weight: bold;
            color: var(--primary-color);
            background-color: var(--highlight-color);
            border-left: 3px solid var(--primary-color);
        }

        .btn-study-mode {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }

        /* Popover de Tradução */
        #translation-popup {
            position: absolute;
            background: var(--container-bg);
            border: 1px solid var(--primary-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 500;
            display: none;
            max-width: 280px;
        }

        /* Seção Inferior */
        .study-section {
            grid-column: 1 / -1;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .study-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .study-text { flex: 1; display: flex; gap: 20px; }
        .orig-txt { width: 45%; font-weight: 500; }
        .trans-txt { width: 45%; color: var(--primary-color); }
        .btn-audio { background: transparent; border: none; color: var(--primary-color); cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header>
        <div class="left-controls">
            <button class="btn-action" id="btn-toggle-config"><i class="fa-solid fa-gear"></i> Carregar Novo Vídeo / Legenda</button>
        </div>
        <button class="theme-toggle" id="theme-btn"><i class="fa-solid fa-moon"></i></button>
    </header>

    <div class="config-box" id="config-panel">
        <h3><i class="fa-solid fa-sliders"></i> Assistente de Importação</h3>
        <div class="config-inputs">
            <div>
                <label style="display:block; margin-bottom:5px;">Link do Vídeo:</label>
                <input type="text" id="video-url-input" class="input-field" style="width:100%;" placeholder="https://www.youtube.com/watch?v=...">
            </div>
            <div>
                <label style="display:block; margin-bottom:5px;">Cole a Transcrição Bruta do YouTube:</label>
                <textarea id="transcript-raw-input" class="input-field" style="width:100%;" placeholder="Cole direto os blocos copiados com marcas de tempo ou segundos..."></textarea>
            </div>
        </div>
        <button class="btn-action" id="btn-apply-config" style="align-self: flex-end;"><i class="fa-solid fa-play"></i> Montar Painel de Estudos</button>
    </div>

    <main class="main-container">
        <div class="video-wrapper">
            <div id="player"></div>
        </div>

        <div class="transcript-container">
            <div class="info-tip-bar">
                <i class="fa-solid fa-circle-info"></i>
                <span><strong>Dica de Estudo:</strong> Selecione qualquer palavra ou trecho do texto com o mouse para ver a tradução instantânea!</span>
            </div>

            <div class="transcript-box" id="transcript-box">
                <p style="color: gray; font-style: italic; text-align: center; margin-top: 40px;">Clique no botão superior para carregar um vídeo e sua legenda!</p>
            </div>
            <button class="btn-study-mode" id="btn-generate-study">Criar Espaço de Estudo Abaixo</button>
        </div>

        <div id="translation-popup">
            <strong style="font-size:0.75rem; color:gray;">Tradução rápida:</strong>
            <p id="pop-text" style="font-size: 0.9rem; margin-top: 5px; font-weight: 500;"></p>
        </div>

        <section class="study-section" id="study-section">
            <h3 style="margin-bottom: 15px;">Linha por Linha com Áudio Nativo</h3>
            <div id="study-lines-container"></div>
        </section>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        let trackingInterval;

        const configPanel = document.getElementById('config-panel');
        const btnToggleConfig = document.getElementById('btn-toggle-config');
        const btnApplyConfig = document.getElementById('btn-apply-config');
        const videoUrlInput = document.getElementById('video-url-input');
        const transcriptRawInput = document.getElementById('transcript-raw-input');
        const transcriptBox = document.getElementById('transcript-box');
        const translationPopup = document.getElementById('translation-popup');
        const popText = document.getElementById('pop-text');
        const btnGenerateStudy = document.getElementById('btn-generate-study');
        const studySection = document.getElementById('study-section');
        const studyLinesContainer = document.getElementById('study-lines-container');
        const themeBtn = document.getElementById('theme-btn');

        btnToggleConfig.addEventListener('click', () => configPanel.classList.toggle('hidden'));

        themeBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            themeBtn.innerHTML = newTheme === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        });

        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : '7SRa1M29cNM';
        }

        function timestampToSeconds(timeStr) {
            // Se o texto vier como "41 segundos", extrai apenas o número
            if (timeStr.includes('segundo')) {
                return parseInt(timeStr.replace(/\D/g, ''), 10) || 0;
            }
            const parts = timeStr.split(':').map(Number);
            if (parts.length === 2) return (parts[0] * 60) + parts[1];
            if (parts.length === 3) return (parts[0] * 3600) + (parts[1] * 60) + parts[2];
            return 0;
        }

        // Nova função inteligente de limpeza e processamento
        function parseTranscript(rawText) {
            transcriptBox.innerHTML = '';
            const lines = rawText.split('\n');
            let currentSec = 0;

            lines.forEach(line => {
                let cleanedLine = line.trim();
                if (!cleanedLine) return;

                // 1. Limpeza crucial: Remove tags de som entre colchetes como [music], [laughter], etc.
                cleanedLine = cleanedLine.replace(/\[.*?\]/g, '').trim();
                if (!cleanedLine) return; // Se a linha só tinha som, pula

                // 2. Tenta capturar carimbos de tempo tradicionais (ex: 0:09) ou customizados (ex: 9 segundos)
                const timeMatch = cleanedLine.match(/^(\d{1,2}:\d{2}(?::\d{2})?)/) || cleanedLine.match(/^(\d+\s*segundo[s]?)/i);

                if (timeMatch) {
                    currentSec = timestampToSeconds(timeMatch[1]);
                    // Extrai o texto removendo a marca de tempo inicial
                    let textContent = cleanedLine.substring(timeMatch[0].length).trim();
                    
                    // Remove hifens soltos criados por tempos textuais residuais
                    textContent = textContent.replace(/^[^a-zA-Z0-9]+/, '').trim();

                    if(textContent) {
                        createLineDOM(textContent, currentSec);
                    }
                } else {
                    // Se não houver marca de tempo, anexa ao elemento anterior ou cria no tempo corrente
                    const activeLines = transcriptBox.querySelectorAll('.transcript-line');
                    if (activeLines.length > 0) {
                        activeLines[activeLines.length - 1].innerText += ' ' + cleanedLine;
                    } else {
                        createLineDOM(cleanedLine, currentSec);
                    }
                }
            });
        }

        function createLineDOM(text, seconds) {
            const div = document.createElement('div');
            div.className = 'transcript-line';
            div.setAttribute('data-time', seconds);
            div.innerText = text; // Insere o texto limpo sem marcas de tempo na tela
            transcriptBox.appendChild(div);
        }

        btnApplyConfig.addEventListener('click', () => {
            const vId = extractVideoID(videoUrlInput.value);
            if (player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(vId);
            }

            const rawText = transcriptRawInput.value.trim();
            if (rawText) {
                parseTranscript(rawText);
            } else {
                alert("Por favor, cole um texto de legenda.");
                return;
            }

            configPanel.classList.add('hidden');
            studySection.style.display = 'none';
        });

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '7SRa1M29cNM',
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                trackingInterval = setInterval(updateTranscriptHighlight, 300);
            } else {
                clearInterval(trackingInterval);
            }
        }

        function updateTranscriptHighlight() {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            const currentTime = player.getCurrentTime();
            const lines = document.querySelectorAll('.transcript-line');
            let activeLine = null;

            lines.forEach((line, index) => {
                const lineTime = parseFloat(line.getAttribute('data-time'));
                const nextLineTime = lines[index + 1] ? parseFloat(lines[index + 1].getAttribute('data-time')) : Infinity;

                if (currentTime >= lineTime && currentTime < nextLineTime) {
                    line.classList.add('active');
                    activeLine = line;
                } else {
                    line.classList.remove('active');
                }
            });

            if (activeLine) activeLine.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        transcriptBox.addEventListener('click', (e) => {
            const line = e.target.closest('.transcript-line');
            if (line && player && typeof player.seekTo === 'function') {
                player.seekTo(parseFloat(line.getAttribute('data-time')), true);
            }
        });

        // Captura inteligente e limpa da seleção do usuário
        transcriptBox.addEventListener('mouseup', (e) => {
            const selection = window.getSelection().toString().trim();
            if (selection.length > 0) {
                popText.textContent = `"${selection}" foi selecionada. Veja a pronúncia e estude esta linha inteira no espaço inferior!`;
                translationPopup.style.left = `${e.pageX + 10}px`;
                translationPopup.style.top = `${e.pageY + 10}px`;
                translationPopup.style.display = 'block';
            } else {
                translationPopup.style.display = 'none';
            }
        });

        document.addEventListener('mousedown', (e) => {
            if(!translationPopup.contains(e.target)) translationPopup.style.display = 'none';
        });

        btnGenerateStudy.addEventListener('click', () => {
            studyLinesContainer.innerHTML = '';
            const lines = document.querySelectorAll('.transcript-line');

            if(lines.length === 0 || lines[0].textContent.includes("Clique no botão")) {
                alert("Carregue uma legenda primeiro!");
                return;
            }

            lines.forEach(line => {
                const originalText = line.innerText.trim();

                const row = document.createElement('div');
                row.className = 'study-line';
                row.innerHTML = `
                    <div class="study-text">
                        <span class="orig-txt">${originalText}</span>
                        <span class="trans-txt" style="font-style:italic; color:gray;">Toque no alto-falante ao lado para praticar o listening</span>
                    </div>
                    <button class="btn-audio" title="Ouvir áudio"><i class="fa-solid fa-volume-high"></i></button>
                `;

                row.querySelector('.btn-audio').addEventListener('click', () => {
                    const utterance = new SpeechSynthesisUtterance(originalText);
                    utterance.lang = 'en-US';
                    window.speechSynthesis.speak(utterance);
                });

                studyLinesContainer.appendChild(row);
            });

            studySection.style.display = 'block';
            studySection.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
